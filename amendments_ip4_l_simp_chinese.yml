any_government_ig_wants_dictatorship_tt: "一個[concept_powerful] [concept_interest_group] [concept_in_government]支持頒布[GetLawType('law_autocracy').GetName]、[GetLawType('law_technocracy').GetName]或[GetLawType('law_single_party_state').GetName]"

amendment_reinstated_fueros: "恢復的自治權"
amendment_reinstated_fueros_desc: "巴斯克地區的古老傳統權利，即Fueros，已通過皇家法令恢復。"

amendment_economic_regeneration_1: "復興遺產"
amendment_economic_regeneration_1_desc: "復興的成功導致投資者信心激增。只要國家保持當前路線，它將有資本可供支配。"

amendment_economic_regeneration_2: "復興遺產"
amendment_economic_regeneration_2_desc: "復興的成功對致投資者信心激增。只要國家保持當前路線，它將有資本可供支配。"